# render.yaml — One-click deploy blueprint for Render.com
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: quizzie-db
    databaseName: quizzie_db
    user: quizzie_user
    plan: free          # free tier: 1 GB storage, shared CPU

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: quizzie-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quizzie-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true         # Render auto-generates a secure random value
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false                 # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false                 # e.g. https://quizzie-frontend.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false                 # Set in Render dashboard (your Gmail)
      - key: SMTP_PASSWORD
        sync: false                 # Set in Render dashboard (App Password)
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: Quizzie

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: quizzie-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: ""   # Leave blank — nginx proxies /api/ to backend internally
